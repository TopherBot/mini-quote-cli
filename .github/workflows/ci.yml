name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: '0 3 * * 0'   # weekly cron to catch flakiness

permissions:
  contents: read
  packages: write
  # restrict token to read‑only by default
  # note: jobs that need write access must explicitly request it

jobs:
  lint-and-test:
    runs-on: ubuntu-22.04
    timeout-minutes: 10
    concurrency:
      group: ${{ github.ref }}
      cancel-in-progress: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff pytest
      - name: Lint with ruff
        run: ruff check .
      - name: Run tests
        run: pytest
      - name: Notify on failure (optional)
        if: failure()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          curl -X POST -H 'Content-type: application/json' \
            --data "{\"text\": \"❗ CI failed for ${{ github.repository }} (run ${{ github.run_id }})\"}" \
            $SLACK_WEBHOOK_URL
